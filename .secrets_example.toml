# 帳號與憑證設定範例
# 本機:複製本檔內容到 .streamlit/secrets.toml(該檔已被 .gitignore 排除,不會進 git)
# Streamlit Cloud:把以下內容貼到 App → Settings → Secrets
#
# 不設定也能跑:未設定 [auth] 時系統會自動進入「展示模式」並用展示帳號,
# 但 UI 會明確標示展示模式;正式對外請務必設定下方 [auth]。

# ── 登入帳號(三個固定角色,只放密碼) ─────────────────────────────
[auth]
admin = "請改成你的強密碼"
operator = "請改成你的強密碼"
viewer = "請改成你的強密碼"
# 也可改用環境變數:APP_ADMIN_PW / APP_OPERATOR_PW / APP_VIEWER_PW

# ── Google Sheets 服務帳號(只有要用雲端 Sheets 才需要) ───────────
# [gcp_service_account]
# type = "service_account"
# project_id = "your-project-id"
# private_key_id = "..."
# private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
# client_email = "xxxx@your-project.iam.gserviceaccount.com"
# client_id = "..."
# token_uri = "https://oauth2.googleapis.com/token"
